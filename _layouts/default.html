<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="">
  <meta name="author" content="{{ site.author }}">
  <title>{{ site.title }}{% if page.title %} | {{ page.title }}{% endif %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.0/font/bootstrap-icons.css">
</head>
{% assign nav_pages = site.pages | where_exp: "page", "page.title != nil" %}

<body class="d-flex flex-column h-100">
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ site.url }}">{{ site.title }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            {% for nav_page in nav_pages %}
            <li class="nav-item">
              <a class="nav-link{% if nav_page.url == page.url %} active{% endif %}" href="{{ nav_page.url }}">{{ nav_page.title }}</a>
            </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="flex-shrink-0 mt-3 mb-3">
    <div class="container">
      <div class="bg-light p-5 rounded">
        {{ page.content | markdownify | smartify }}
      </div>
    </div>
  </main>

  <footer class="footer mt-auto p-3 bg-light">
    <div class="container-fluid">
      <a rel="me" class="link-secondary" href="https://github.com/{{ site.github_username | cgi_escape | escape }}" title="{{ site.github_username | escape }}"><i class="bi bi-github"></i></a>
      <a rel="me" class="link-secondary" href="https://www.linkedin.com/in/{{ site.linkedin_username | cgi_escape | escape }}" title="{{ site.linkedin_username | escape }}"><i class="bi bi-linkedin"></i></a>
      <a rel="me" class="link-secondary" href="https://twitter.com/{{ site.twitter_username | cgi_escape | escape }}" title="{{ site.twitter_username | escape }}"><i class="bi bi-twitter"></i></a>
      <a rel="me" class="link-secondary" href="{{ 'feed.xml' | relative_url }}" title="RSS"><i class="bi bi-rss-fill"></i></a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous"></script>
</body>

</html>
